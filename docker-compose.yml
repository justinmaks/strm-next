services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: strm-next:latest
    container_name: strm-next
    init: true
    restart: unless-stopped

    # Bind to loopback only — nginx on the host is the only thing that
    # should reach this. Cloudflare → nginx (443) → 127.0.0.1:3000.
    ports:
      - "127.0.0.1:3000:3000"

    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      TMDB_API_KEY: ${TMDB_API_KEY:?TMDB_API_KEY not set}

    # Persist app logs in a named volume. Docker creates it owned by the
    # image's runtime user (UID 1001), avoiding host-UID mismatch on bind
    # mounts. Read logs via `docker compose exec web ls /app/logs` or
    # `docker run --rm -v strm-next_logs:/data busybox tar c /data | tar x`.
    volumes:
      - logs:/app/logs

    # Hardening
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 2g
    mem_reservation: 1g

    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  logs:
